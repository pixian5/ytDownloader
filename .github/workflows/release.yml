name: Build And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
          RELEASE_NAME="v${VERSION} build ${GITHUB_RUN_NUMBER}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${RELEASE_NAME}" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: linux
            setup_command: curl -L https://github.com/aandrew-me/ffmpeg-builds/releases/download/v8/ffmpeg_linux_amd64.tar.xz -o ffmpeg_linux_amd64.tar.xz && curl -L https://github.com/aandrew-me/ffmpeg-builds/releases/download/v8/node_linux_amd64 -o node && chmod +x node && tar -xf ffmpeg_linux_amd64.tar.xz && rm -rf ffmpeg && mv ffmpeg_linux_amd64 ffmpeg && chmod +x ffmpeg/bin/ffmpeg ffmpeg/bin/ffprobe
            build_command: npx electron-builder --linux AppImage zip --publish never
          - os: windows-latest
            artifact_name: windows
            setup_command: powershell -ExecutionPolicy Bypass -File windows.ps1
            build_command: npx electron-builder --win nsis zip --x64 --publish never
          - os: macos-15-intel
            artifact_name: macos-intel
            setup_command: bash mac.sh
            build_command: npx electron-builder --mac dmg zip --x64 --publish never
          - os: macos-14
            artifact_name: macos-apple-silicon
            setup_command: bash mac.sh
            build_command: npx electron-builder --mac dmg zip --arm64 --publish never
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare ffmpeg assets
        run: ${{ matrix.setup_command }}

      - name: Build release artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ${{ matrix.build_command }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: release/*
          if-no-files-found: error

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
